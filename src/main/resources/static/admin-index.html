<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/api.js"></script>
<script>
renderShell("admin");
</script>
<script>
document.getElementById("app").innerHTML = `
    <div class="page-title">
        <h1>用户与登录日志</h1>
        <p class="muted">管理员可查看用户、调整状态、分配角色，并查看登录审计日志。</p>
    </div>
    <section class="panel">
        <div class="toolbar">
            <div class="form-row"><label>关键字</label><input id="userKeyword" placeholder="用户名/姓名/邮箱"></div>
            <div class="form-row"><label>角色</label><select id="roleCode"><option value="">全部</option><option>ADMIN</option><option>TEACHER</option><option>STUDENT</option></select></div>
            <button onclick="loadUsers()">查询用户</button>
        </div>
        <div id="userStatus" class="status"></div>
        <table><thead><tr><th>ID</th><th>用户名</th><th>姓名</th><th>邮箱</th><th>角色</th><th>状态</th><th>操作</th></tr></thead><tbody id="userRows"></tbody></table>
    </section>
    <section class="panel">
        <div class="toolbar">
            <div class="form-row"><label>用户名</label><input id="logUsername"></div>
            <button onclick="loadLogs()">查询日志</button>
        </div>
        <table><thead><tr><th>时间</th><th>用户名</th><th>IP</th><th>状态</th><th>失败原因</th></tr></thead><tbody id="logRows"></tbody></table>
    </section>
`;

async function loadUsers() {
    try {
        const data = await request("/users" + qs({
            keyword: document.getElementById("userKeyword").value,
            roleCode: document.getElementById("roleCode").value,
            pageSize: 50
        }));
        document.getElementById("userRows").innerHTML = data.records.map(u => `
            <tr>
                <td>${u.id}</td><td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.realName)}</td><td>${escapeHtml(u.email)}</td>
                <td>${(u.roles || []).map(r => '<span class="pill">' + escapeHtml(r) + '</span>').join(" ")}</td>
                <td><span class="pill ${u.status === 1 ? "success" : "danger"}">${u.status === 1 ? "正常" : "禁用"}</span></td>
                <td class="actions">
                    <button class="secondary" onclick="toggleStatus(${u.id}, ${u.status === 1 ? 0 : 1})">${u.status === 1 ? "禁用" : "启用"}</button>
                    <button class="secondary" onclick="setRoles(${u.id})">设置角色</button>
                </td>
            </tr>
        `).join("");
    } catch (e) {
        setStatus(e.message, false, "userStatus");
    }
}

async function toggleStatus(id, status) {
    await request(`/users/${id}/status`, { method: "PUT", body: JSON.stringify({ status }) });
    loadUsers();
}

async function setRoles(id) {
    const text = prompt("请输入角色编码，多个用英文逗号分隔", "STUDENT");
    if (!text) return;
    const roleCodes = text.split(",").map(s => s.trim()).filter(Boolean);
    await request(`/users/${id}/roles`, { method: "PUT", body: JSON.stringify({ roleCodes }) });
    loadUsers();
}

async function loadLogs() {
    const data = await request("/login-logs" + qs({ username: document.getElementById("logUsername").value, pageSize: 50 }));
    document.getElementById("logRows").innerHTML = data.records.map(log => `
        <tr><td>${escapeHtml(log.loginTime)}</td><td>${escapeHtml(log.username)}</td><td>${escapeHtml(log.loginIp)}</td><td><span class="pill ${log.loginStatus === 1 ? "success" : "danger"}">${log.loginStatus === 1 ? "成功" : "失败"}</span></td><td>${escapeHtml(log.failReason)}</td></tr>
    `).join("");
}

loadUsers();
loadLogs();
</script>
</body>
</html>
