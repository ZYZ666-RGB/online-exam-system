<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线答题</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/api.js"></script>
<script>
renderShell("exams");
const examId = new URLSearchParams(location.search).get("id");
let questions = [];
document.getElementById("app").innerHTML = `
    <div class="page-title"><h1>在线答题</h1><p class="muted">页面不会显示正确答案，提交后由后端自动判分。</p></div>
    <section class="panel">
        <div id="questionArea"></div>
        <div id="status" class="status"></div>
        <button onclick="submitExam()">提交试卷</button>
    </section>
`;

function optionInput(q, key, text) {
    if (!text) return "";
    const type = q.questionType === "multiple" ? "checkbox" : "radio";
    return `<label class="option-item"><input type="${type}" name="q_${q.questionId}" value="${key}">${key}. ${escapeHtml(text)}</label>`;
}

async function loadQuestions() {
    questions = await request(`/exams/${examId}/questions`);
    document.getElementById("questionArea").innerHTML = questions.map((q, index) => `
        <div class="question-block">
            <strong>${index + 1}. [${q.questionType}] ${escapeHtml(q.title)}（${q.questionScore}分）</strong>
            <div class="option-list">
                ${optionInput(q, "A", q.optionA)}
                ${optionInput(q, "B", q.optionB)}
                ${optionInput(q, "C", q.optionC)}
                ${optionInput(q, "D", q.optionD)}
            </div>
        </div>
    `).join("");
}

async function submitExam() {
    if (!confirm("确认提交试卷？")) return;
    const answers = questions.map(q => {
        const checked = Array.from(document.querySelectorAll(`input[name="q_${q.questionId}"]:checked`)).map(input => input.value);
        return { questionId: q.questionId, studentAnswer: checked.join(",") };
    });
    try {
        const score = await request(`/exams/${examId}/submit`, { method: "POST", body: JSON.stringify({ answers }) });
        setStatus(`提交成功，得分：${score}`);
        setTimeout(() => location.href = "score-list.html", 800);
    } catch (e) {
        setStatus(e.message, false);
    }
}

loadQuestions();
</script>
</body>
</html>
